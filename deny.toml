# cargo-deny configuration
[advisories]
ignore = []
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
[bans]
multiple-versions = "deny"
wildcards = "allow"
skip = [
    # tower 0.4 vs 0.5: 0.4 used directly, 0.5 required by axum
    { crate = "tower", reason = "0.4 direct dep, 0.5 required by axum" },
    # tower-http 0.5 vs 0.6: 0.5 used directly, 0.6 required by reqwest
    { crate = "tower-http", reason = "0.5 direct dep, 0.6 required by reqwest" },
    # windows-sys: unavoidable transitive dupes on linux
    { crate = "windows-sys", reason = "unavoidable transitive dep on non-Windows" },
]
skip-tree = []
[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
