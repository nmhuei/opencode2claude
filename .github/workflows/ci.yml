name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Verification (CI profile)
        run: ./scripts/verify.sh all --profile ci

      - name: Shellcheck
        run: shellcheck scripts/verify.sh scripts/lib/*.sh scripts/phases/*.sh start.sh stop.sh install.sh

      - name: Cargo audit
        run: cargo install cargo-audit --locked && cargo audit

      - name: Cargo deny
        run: cargo install cargo-deny --locked && cargo deny check

  release-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release --locked
