<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#161b22" />
      <stop offset="100%" stop-color="#0d1117" />
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" />
      <stop offset="50%" stop-color="#79c0ff" />
      <stop offset="100%" stop-color="#bc8cff" />
    </linearGradient>
    <linearGradient id="blobBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="blobPurple" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bc8cff" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#8957e5" stop-opacity="0.04" />
    </linearGradient>
    <linearGradient id="bridgeBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c2333" />
      <stop offset="100%" stop-color="#151b2a" />
    </linearGradient>
    <linearGradient id="bridgeBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff" />
      <stop offset="50%" stop-color="#79c0ff" />
      <stop offset="100%" stop-color="#bc8cff" />
    </linearGradient>
    <filter id="titleGlow">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="boxShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3" />
    </filter>
    <pattern id="dotGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#30363d" opacity="0.4" />
    </pattern>
    <marker id="arrowRight" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="#8b949e" />
    </marker>
    <marker id="arrowRightBridge" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="#79c0ff" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d1117" />
  <rect width="1200" height="630" fill="url(#bgGlow)" />
  <rect width="1200" height="630" fill="url(#dotGrid)" />

  <!-- Decorative blobs -->
  <ellipse cx="160" cy="140" rx="320" ry="240" fill="url(#blobBlue)" />
  <ellipse cx="1040" cy="490" rx="300" ry="220" fill="url(#blobPurple)" />

  <!-- Decorative code brackets -->
  <text x="88" y="490" font-family="Courier New, Liberation Mono, monospace" font-size="148" fill="#30363d" opacity="0.25" font-weight="bold">&lt;/&gt;</text>
  <text x="960" y="140" font-family="Courier New, Liberation Mono, monospace" font-size="112" fill="#30363d" opacity="0.20" font-weight="bold">{ }</text>

  <!-- Terminal dots -->
  <circle cx="36" cy="36" r="6" fill="#ff5555" opacity="0.7" />
  <circle cx="58" cy="36" r="6" fill="#ffb347" opacity="0.7" />
  <circle cx="80" cy="36" r="6" fill="#48d968" opacity="0.7" />

  <!-- Badges -->
  <rect x="1030" y="28" width="68" height="28" rx="14" fill="#21262d" stroke="#30363d" stroke-width="1" />
  <text x="1064" y="46" font-family="Courier New, Liberation Mono, monospace" font-size="13" fill="#7ee787" text-anchor="middle" font-weight="bold">v0.2.0</text>

  <rect x="1108" y="28" width="56" height="28" rx="14" fill="#21262d" stroke="#30363d" stroke-width="1" />
  <text x="1136" y="46" font-family="Courier New, Liberation Mono, monospace" font-size="13" fill="#8b949e" text-anchor="middle" font-weight="bold">MIT</text>

  <!-- Title -->
  <text x="600" y="188" font-family="Courier New, Liberation Mono, monospace" font-size="74" fill="url(#titleGrad)" text-anchor="middle" font-weight="bold" filter="url(#titleGlow)">OpenCode2Claude</text>

  <!-- Subtitle -->
  <text x="600" y="240" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="26" fill="#8b949e" text-anchor="middle">Use Claude Code with any LLM — for free.</text>

  <!-- Flow diagram -->
  <!-- Claude Code box -->
  <rect x="120" y="310" width="180" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#boxShadow)" />
  <text x="210" y="340" font-family="Courier New, Liberation Mono, monospace" font-size="15" fill="#e6edf3" text-anchor="middle" font-weight="bold">Claude Code</text>
  <text x="210" y="362" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Client</text>

  <!-- Arrow 1 -->
  <line x1="300" y1="345" x2="360" y2="345" stroke="#8b949e" stroke-width="2" marker-end="url(#arrowRight)" />

  <!-- Bridge box (highlighted) -->
  <rect x="370" y="300" width="180" height="90" rx="8" fill="url(#bridgeBg)" stroke="url(#bridgeBorder)" stroke-width="2" filter="url(#boxShadow)" />
  <text x="460" y="340" font-family="Courier New, Liberation Mono, monospace" font-size="15" fill="#79c0ff" text-anchor="middle" font-weight="bold">Bridge</text>
  <text x="460" y="358" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">HTTP Proxy</text>
  <text x="460" y="374" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="10" fill="#484f58" text-anchor="middle">:4000</text>

  <!-- Arrow 2 -->
  <line x1="550" y1="345" x2="610" y2="345" stroke="#79c0ff" stroke-width="2" marker-end="url(#arrowRightBridge)" />

  <!-- OpenCode box -->
  <rect x="620" y="310" width="180" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#boxShadow)" />
  <text x="710" y="340" font-family="Courier New, Liberation Mono, monospace" font-size="15" fill="#e6edf3" text-anchor="middle" font-weight="bold">OpenCode</text>
  <text x="710" y="362" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">CLI Daemon</text>

  <!-- Arrow 3 -->
  <line x1="800" y1="345" x2="860" y2="345" stroke="#8b949e" stroke-width="2" marker-end="url(#arrowRight)" />

  <!-- Any LLM box -->
  <rect x="870" y="310" width="180" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#boxShadow)" />
  <text x="960" y="340" font-family="Courier New, Liberation Mono, monospace" font-size="15" fill="#e6edf3" text-anchor="middle" font-weight="bold">Any LLM</text>
  <text x="960" y="362" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">DeepSeek / GPT / Gemini…</text>

  <!-- Divider line -->
  <line x1="60" y1="560" x2="1140" y2="560" stroke="#21262d" stroke-width="1" />

  <!-- Repository URL -->
  <text x="600" y="588" font-family="Courier New, Liberation Mono, monospace" font-size="14" fill="#484f58" text-anchor="middle">github.com/nmhuei/opencode2claude</text>
</svg>
